<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>RCCG ON EAGLES WINGS — Member Registry</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="style.css"/>
</head>
<body class="login-page">

<div class="login-bg">
  <div class="login-cross"></div>
</div>

<div class="login-wrap">
  <div class="login-card">
    <div class="login-logo">
       <img src="images/oew_logo (2).png" alt="RCCG ON EAGLES WINGS">
      <span class="logo-name">RCCG ON EAGLES WINGS</span>
      <span class="logo-sub">Members Registry</span>
    </div>

    <h1 class="login-title">Welcome back</h1>
    <p class="login-desc">Sign in to access the member registry</p>

    <div class="form-group">
      <label>Username</label>
      <input type="text" id="username" placeholder="Enter your username" />
    </div>
    <div class="form-group">
      <div class="password-wrapper"> 
      <label class="login-password">Password</label>
      <input type="password" id="password" placeholder="Enter your password" />
     <button type="button" id="toggle-password">Show</button>
      </div>
    </div>
    <div id="login-error" class="login-error" style="display:none">Incorrect username or password</div>
    <button class="btn-full" id="signin-btn" onclick="doLogin()">Sign In</button>

    <watermark>
    <span class="brand-name"> Built by Majesty</span> 
       <span class="EST">&#9412; 2026</span>
    </watermark>
  </div>
</div>

<script type="module">
  const passwordInput = document.getElementById('password');
const togglePassword = document.getElementById('toggle-password');

togglePassword.addEventListener('click', () => {
  if (passwordInput.type === 'password') {
    passwordInput.type = 'text';
    togglePassword.textContent = 'Hide';
  } else {
    passwordInput.type = 'password';
    togglePassword.textContent = 'Show';
  }
});
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAihMWWgeEq_hVxH7taxbIv5Yy6oM2rhsA",
    authDomain: "rccg-on-eagles-wings.firebaseapp.com",
    projectId: "rccg-on-eagles-wings",
    storageBucket: "rccg-on-eagles-wings.firebasestorage.app",
    messagingSenderId: "1078040782537",
    appId: "1:1078040782537:web:a117ba6414a8b6a7d8cf18"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  if (sessionStorage.getItem('gc_auth')) window.location.href = 'dashboard.html';

 window.doLogin = async function() {
  const email = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value.trim(); // match your actual id
  const err = document.getElementById('login-error');
  const btn = document.getElementById('signin-btn');

  err.style.display = 'none';
  btn.disabled = true;
  btn.textContent = 'Signing in...';

  try {
    const result = await signInWithEmailAndPassword(auth, email, password);
    sessionStorage.setItem('gc_auth', '1');
    sessionStorage.setItem('gc_user', result.user.email);
    window.location.href = 'dashboard.html';
  } catch (e) {
    err.style.display = 'block';
    document.getElementById('password').value = '';
    btn.disabled = false;
    btn.textContent = 'Sign In';
  }
}

  document.addEventListener('keydown', e => { if (e.key === 'Enter') window.doLogin(); });
</script>
</body>
</html>
