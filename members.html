<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Members — RCCG ON EAGLES WINGS</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="style.css" />
</head>
<body class="app-page">

<aside class="sidebar">
  <div class="sidebar-logo">
   <img src="images/oew_logo (2).png" alt="RCCG ON EAGLES WINGS">
    <div>
      <div class="logo-name">RCCG ON EAGLES WINGS</div>
      <div class="logo-sub">Member Registry</div>
    </div>
  </div>
  <nav class="sidebar-nav">
    <a href="dashboard.html" class="nav-item">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      Dashboard
    </a>
    <a href="members.html" class="nav-item active">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="9" cy="7" r="4"/><path d="M3 21v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/><path d="M21 21v-2a4 4 0 0 0-3-3.85"/></svg>
      All Members
    </a>
    <a href="add-member.html" class="nav-item">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="8" r="4"/><path d="M20 21a8 8 0 1 0-16 0"/><line x1="12" y1="17" x2="12" y2="23"/><line x1="9" y1="20" x2="15" y2="20"/></svg>
      Add Member
    </a>
  </nav>
  <div class="sidebar-footer">
    <div class="user-badge">
      <div class="user-avatar">A</div>
      <div>
        <div class="user-name" id="sidebar-username">Admin</div>
        <div class="user-role">Team Member</div>
      </div>
    </div>
    <button class="logout-btn" onclick="logout()">Sign out</button>
  </div>
</aside>

<main class="main-content">
 <div class="sidebar-overlay" id="overlay" onclick="closeSidebar()"></div>
  <div class="page-header">
    <div class="page-header-left">
      <button class="hamburger" onclick="openSidebar()" aria-label="Open menu"><span></span></button>
      <h1 class="page-title">All Members</h1>
    </div>
    <a href="add-member.html" class="btn-primary-sm">+ Add Member</a>
  </div>


  <div class="search-bar">
    <div class="search-input-wrap">
      <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="search" placeholder="Search by name or phone number..." oninput="filter()" />
    </div>
    <select id="filter-status" onchange="filter()">
      <option value="">All members</option>
      <option value="new">New members</option>
      <option value="existing">Existing members</option>
    </select>
    <select id="filter-gender" onchange="filter()">
      <option value="">All genders</option>
      <option value="Male">Male</option>
      <option value="Female">Female</option>
    </select>
  </div>

  <div class="results-count" id="results-count"></div>

  <div class="table-wrap">
    <table class="members-table">
      <thead>
        <tr>
          <th>Name</th>
          <th>Phone</th>
          <th>Email</th>
          <th>Address</th>
          <th>Date Added</th>
          <th>Status</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="members-tbody"></tbody>
    </table>
    <div id="empty" class="empty-state" style="display:none">
      <div class="empty-icon">⊘</div>
      <p>No members match your search</p>
    </div>
  </div>
</main>

<script src="data.js"></script>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAihMWWgeEq_hVxH7taxbIv5Yy6oM2rhsA",
    authDomain: "rccg-on-eagles-wings.firebaseapp.com",
    projectId: "rccg-on-eagles-wings",
    storageBucket: "rccg-on-eagles-wings.firebasestorage.app",
    messagingSenderId: "1078040782537",
    appId: "1:1078040782537:web:a117ba6414a8b6a7d8cf18"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  requireAuth();
  document.getElementById('sidebar-username').textContent = 'Admin';

  function initials(m){ return (m.firstName[0]+m.lastName[0]).toUpperCase(); }
  function avatarBg(id){ const c=['#e8d5b7','#c9d5e8','#d5e8d5','#e8d5e0','#d5e0e8','#e8e4d5']; return c[id%6]; }
  function formatDate(d){ return new Date(d).toLocaleDateString('en-NG',{day:'2-digit',month:'short',year:'numeric'}); }

  let allMembers = [];

  async function loadMembers() {
    const snapshot = await getDocs(collection(db, 'members'));
    allMembers = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
    filter();
  }

  window.filter = function() {
    const q = document.getElementById('search').value.toLowerCase().trim();
    const st = document.getElementById('filter-status').value;
    const gn = document.getElementById('filter-gender').value;
    const filtered = allMembers.filter(m => {
      const name = (m.firstName+' '+m.lastName).toLowerCase();
      const phone = m.phone.replace(/\s/g,'');
      const matchQ = !q || name.includes(q) || phone.includes(q.replace(/\s/g,''));
      const matchSt = !st || m.status === st;
      const matchGn = !gn || m.gender === gn;
      return matchQ && matchSt && matchGn;
    });
    renderTable(filtered);
  }

  function renderTable(list) {
    const tbody = document.getElementById('members-tbody');
    const empty = document.getElementById('empty');
    document.getElementById('results-count').textContent = `${list.length} member${list.length!==1?'s':''} found`;
    if (!list.length) { tbody.innerHTML=''; empty.style.display='block'; return; }
    empty.style.display='none';
    tbody.innerHTML = list.map((m,i) => `
      <tr onclick="window.location='member-detail.html?id=${m.id}'" style="cursor:pointer">
        <td><div class="name-cell"><div class="avatar-sm" style="background:${avatarBg(i)}">${initials(m)}</div>${m.firstName} ${m.lastName}</div></td>
        <td>${m.phone}</td>
        <td style="color:var(--muted)">${m.email||'—'}</td>
        <td style="color:var(--muted);max-width:160px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${m.address||'—'}</td>
        <td>${formatDate(m.dateAdded)}</td>
        <td><span class="badge badge-${m.status}">${m.status==='new'?'New':'Existing'}</span></td>
        <td><button class="row-action" onclick="event.stopPropagation();window.location='member-detail.html?id=${m.id}'">View →</button></td>
      </tr>
    `).join('');
  }

  loadMembers();
</script>
</body>
</html>
