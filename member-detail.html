<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Member Profile — RCCG ON EAGLES WINGS</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/style.css" />
</head>
<body class="app-page">

<aside class="sidebar">
 <div class="sidebar-logo">
   <img src="images/oew_logo (2).png" alt="RCCG ON EAGLES WINGS">
    <div>
      <div class="logo-name">RCCG ON EAGLES WINGS</div>
      <div class="logo-sub">Member Registry</div>
    </div>
  </div>
  <nav class="sidebar-nav">
    <a href="dashboard.html" class="nav-item">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      Dashboard
    </a>
    <a href="members.html" class="nav-item">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="9" cy="7" r="4"/><path d="M3 21v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/><path d="M21 21v-2a4 4 0 0 0-3-3.85"/></svg>
      All Members
    </a>
    <a href="add-member.html" class="nav-item">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="8" r="4"/><path d="M20 21a8 8 0 1 0-16 0"/><line x1="12" y1="17" x2="12" y2="23"/><line x1="9" y1="20" x2="15" y2="20"/></svg>
      Add Member
    </a>
  </nav>
  <div class="sidebar-footer">
    <div class="user-badge">
      <div class="user-avatar">A</div>
      <div>
        <div class="user-name" id="sidebar-username">Admin</div>
        <div class="user-role">Team Member</div>
      </div>
    </div>
    <button class="logout-btn" onclick="logout()">Sign out</button>
  </div>
</aside>

<main class="main-content">
  <div class="page-header">
    <a href="members.html" class="back-link">← Back to Members</a>
    <div id="header-actions" style="display:flex;gap:10px"></div>
  </div>

  <div id="profile-wrap"></div>
</main>

<script src="js/data.js"></script>
<script>
requireAuth();
document.getElementById('sidebar-username').textContent = sessionStorage.getItem('gc_user') || 'Admin';

const params = new URLSearchParams(window.location.search);
const id = parseInt(params.get('id'));
const member = getMembers().find(m => m.id === id);

function avatarBg(id){ const c=['#e8d5b7','#c9d5e8','#d5e8d5','#e8d5e0','#d5e0e8','#e8e4d5']; return c[id%c.length]; }
function initials(m){ return (m.firstName[0]+m.lastName[0]).toUpperCase(); }
function formatDate(d){ if(!d) return '—'; return new Date(d).toLocaleDateString('en-NG',{day:'2-digit',month:'long',year:'numeric'}); }
function val(v){ return v||'—'; }

if (!member) {
  document.getElementById('profile-wrap').innerHTML = '<p style="padding:2rem;color:var(--muted)">Member not found.</p>';
} else {
  document.title = `${member.firstName} ${member.lastName} — Grace Connect`;
  document.getElementById('header-actions').innerHTML = `
    <button class="btn-ghost btn-sm" onclick="deleteMember(${member.id})">Delete</button>
  `;
  document.getElementById('profile-wrap').innerHTML = `
    <div class="profile-hero">
      <div class="profile-avatar" style="background:${avatarBg(member.id)}">${initials(member)}</div>
      <div class="profile-hero-info">
        <h1 class="profile-name">${member.firstName} ${member.lastName}</h1>
        <div class="profile-meta">
          <span class="badge badge-${member.status}">${member.status==='new'?'New Member':'Existing Member'}</span>
          ${member.cell ? `<span class="profile-tag">${member.cell}</span>` : ''}
          <span style="color:var(--muted);font-size:13px">Added ${formatDate(member.dateAdded)}</span>
        </div>
      </div>
    </div>

    <div class="profile-grid">
      <div class="profile-card">
        <h3 class="profile-card-title">Contact Details</h3>
        <div class="info-rows">
          <div class="info-row"><span class="info-label">Phone</span><span class="info-val">${val(member.phone)}</span></div>
          ${member.phone2 ? `<div class="info-row"><span class="info-label">Alt. Phone</span><span class="info-val">${member.phone2}</span></div>` : ''}
          <div class="info-row"><span class="info-label">Email</span><span class="info-val">${val(member.email)}</span></div>
          <div class="info-row"><span class="info-label">Address</span><span class="info-val">${val(member.address)}</span></div>
        </div>
      </div>

      <div class="profile-card">
        <h3 class="profile-card-title">Personal Details</h3>
        <div class="info-rows">
          <div class="info-row"><span class="info-label">Date of Birth</span><span class="info-val">${formatDate(member.dob)}</span></div>
          <div class="info-row"><span class="info-label">Gender</span><span class="info-val">${val(member.gender)}</span></div>
          <div class="info-row"><span class="info-label">Marital Status</span><span class="info-val">${val(member.marital)}</span></div>
          <div class="info-row"><span class="info-label">Occupation</span><span class="info-val">${val(member.occupation)}</span></div>
        </div>
      </div>

      <div class="profile-card">
        <h3 class="profile-card-title">Church Information</h3>
        <div class="info-rows">
          <div class="info-row"><span class="info-label">First Visit</span><span class="info-val">${formatDate(member.firstVisit)}</span></div>
          <div class="info-row"><span class="info-label">How They Found Us</span><span class="info-val">${val(member.source)}</span></div>
          <div class="info-row"><span class="info-label">Cell / Unit</span><span class="info-val">${val(member.cell)}</span></div>
        </div>
      </div>

      ${member.notes ? `
      <div class="profile-card">
        <h3 class="profile-card-title">Notes</h3>
        <p style="font-size:14px;color:var(--text);line-height:1.7">${member.notes}</p>
      </div>` : ''}
    </div>
  `;
}

function deleteMember(id) {
  if (confirm('Are you sure you want to delete this member? This cannot be undone.')) {
    const members = getMembers().filter(m => m.id !== id);
    localStorage.setItem('gc_members', JSON.stringify(members));
    window.location.href = 'members.html';
  }
}
</script>
</body>
</html>
