<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Member Profile — RCCG ON EAGLES WINGS</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="style.css" />
</head>
<body class="app-page">

<aside class="sidebar">
 <div class="sidebar-logo">
   <img src="images/oew_logo (2).png" alt="RCCG ON EAGLES WINGS">
    <div>
      <div class="logo-name">RCCG ON EAGLES WINGS</div>
      <div class="logo-sub">Member Registry</div>
    </div>
  </div>
  <nav class="sidebar-nav">
    <a href="dashboard.html" class="nav-item">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      Dashboard
    </a>
    <a href="members.html" class="nav-item">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="9" cy="7" r="4"/><path d="M3 21v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/><path d="M21 21v-2a4 4 0 0 0-3-3.85"/></svg>

    <a href="add-member.html" class="nav-item">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="8" r="4"/><path d="M20 21a8 8 0 1 0-16 0"/><line x1="12" y1="17" x2="12" y2="23"/><line x1="9" y1="20" x2="15" y2="20"/></svg>
      Add Member

  <div class="sidebar-footer">
    <div class="user-badge">
      <div class="user-avatar">A</div>
      <div>
        <div class="user-name" id="sidebar-username">Admin</div>
        <div class="user-role">Team Member</div>
      </div>
    </div>
    <button class="logout-btn" onclick="logout()">Sign out</button>
  </div>
</aside>

<main class="main-content">
  <div class="page-header">
    <a href="members.html" class="back-link">← Back to Members</a>
    <div id="header-actions" style="display:flex;gap:10px"></div>
  </div>

  <div id="profile-wrap"></div>
</main>
<script src="data.js"></script>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, doc, getDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAihMWWgeEq_hVxH7taxbIv5Yy6oM2rhsA",
    authDomain: "rccg-on-eagles-wings.firebaseapp.com",
    projectId: "rccg-on-eagles-wings",
    storageBucket: "rccg-on-eagles-wings.firebasestorage.app",
    messagingSenderId: "1078040782537",
    appId: "1:1078040782537:web:a117ba6414a8b6a7d8cf18"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);

  requireAuth();
  document.getElementById('sidebar-username').textContent = 'Admin';

  function avatarBg(i){ const c=['#e8d5b7','#c9d5e8','#d5e8d5','#e8d5e0','#d5e0e8','#e8e4d5']; return c[i%6]; }
  function initials(m){ return (m.firstName[0]+m.lastName[0]).toUpperCase(); }
  function formatDate(d){ if(!d) return '—'; return new Date(d).toLocaleDateString('en-NG',{day:'2-digit',month:'long',year:'numeric'}); }
  function val(v){ return v||'—'; }

  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');

  async function loadMember() {
    try {
      const snap = await getDoc(doc(db, 'members', id));
      if (!snap.exists()) {
        document.getElementById('profile-wrap').innerHTML = '<p style="padding:2rem;color:var(--muted)">Member not found.</p>';
        return;
      }
      const m = { id: snap.id, ...snap.data() };
      document.title = `${m.firstName} ${m.lastName} — Grace Connect`;
      document.getElementById('header-actions').innerHTML = `
        <button class="btn-ghost btn-sm" onclick="window.deleteMember('${m.id}')">Delete</button>
      `;
      document.getElementById('profile-wrap').innerHTML = `
        <div class="profile-hero">
          <div class="profile-avatar" style="background:${avatarBg(0)}">${initials(m)}</div>
          <div class="profile-hero-info">
            <h1 class="profile-name">${m.firstName} ${m.lastName}</h1>
            <div class="profile-meta">
              <span class="badge badge-${m.status}">${m.status==='new'?'New Member':'Existing Member'}</span>
              ${m.cell ? `<span class="profile-tag">${m.cell}</span>` : ''}
              <span style="color:var(--muted);font-size:13px">Added ${formatDate(m.dateAdded)}</span>
            </div>
          </div>
        </div>
        <div class="profile-grid">
          <div class="profile-card">
            <h3 class="profile-card-title">Contact Details</h3>
            <div class="info-rows">
              <div class="info-row"><span class="info-label">Phone</span><span class="info-val">${val(m.phone)}</span></div>
              ${m.phone2 ? `<div class="info-row"><span class="info-label">Alt. Phone</span><span class="info-val">${m.phone2}</span></div>` : ''}
              <div class="info-row"><span class="info-label">Email</span><span class="info-val">${val(m.email)}</span></div>
              <div class="info-row"><span class="info-label">Address</span><span class="info-val">${val(m.address)}</span></div>
            </div>
          </div>
          <div class="profile-card">
            <h3 class="profile-card-title">Personal Details</h3>
            <div class="info-rows">
              <div class="info-row"><span class="info-label">Date of Birth</span><span class="info-val">${formatDate(m.dob)}</span></div>
              <div class="info-row"><span class="info-label">Gender</span><span class="info-val">${val(m.gender)}</span></div>
              <div class="info-row"><span class="info-label">Marital Status</span><span class="info-val">${val(m.marital)}</span></div>
              <div class="info-row"><span class="info-label">Occupation</span><span class="info-val">${val(m.occupation)}</span></div>
            </div>
          </div>
          <div class="profile-card">
            <h3 class="profile-card-title">Church Information</h3>
            <div class="info-rows">
              <div class="info-row"><span class="info-label">First Visit</span><span class="info-val">${formatDate(m.firstVisit)}</span></div>
              <div class="info-row"><span class="info-label">How They Found Us</span><span class="info-val">${val(m.source)}</span></div>
              <div class="info-row"><span class="info-label">Cell / Unit</span><span class="info-val">${val(m.cell)}</span></div>
            </div>
          </div>
          ${m.notes ? `
          <div class="profile-card">
            <h3 class="profile-card-title">Notes</h3>
            <p style="font-size:14px;color:var(--text);line-height:1.7">${m.notes}</p>
          </div>` : ''}
        </div>
      `;
    } catch (e) {
      console.error('Failed to load member:', e);
      document.getElementById('profile-wrap').innerHTML = '<p style="padding:2rem;color:var(--muted)">Error loading member. Check console for details.</p>';
    }
  }

  function showConfirmModal(message) {
  return new Promise((resolve) => {
    const modal = document.getElementById('confirm-modal');
    document.getElementById('modal-message').textContent = message;
    modal.style.display = 'flex';

    const confirmBtn = document.getElementById('modal-confirm');
    const cancelBtn = document.getElementById('modal-cancel');

    function cleanup(result) {
      modal.style.display = 'none';
      confirmBtn.removeEventListener('click', onConfirm);
      cancelBtn.removeEventListener('click', onCancel);
      resolve(result);
    }
    function onConfirm() { cleanup(true); }
    function onCancel() { cleanup(false); }

    confirmBtn.addEventListener('click', onConfirm);
    cancelBtn.addEventListener('click', onCancel);
  });
}

window.deleteMember = async function(id) {
  const confirmed = await showConfirmModal('Are you certain you want to delete this member? This cannot be undone.');
  if (!confirmed) return;
  try {
    await deleteDoc(doc(db, 'members', id));
    window.location.href = 'members.html';
  } catch (e) {
    console.error('Failed to delete member:', e);
    alert('Failed to delete member. Check console for details.');
  }
}

  onAuthStateChanged(auth, (user) => {
    if (user) {
      loadMember();
    } else {
      window.location.href = 'index.html';
    }
  });
</script>
<div id="confirm-modal" class="modal-overlay" style="display:none;">
  <div class="modal-box">
    <p class="modal-message" id="modal-message">Are you sure you want to delete this member from the registry?</p>
    <div class="modal-actions">
      <button class="btn-ghost btn-sm" id="modal-cancel">Cancel</button>
      <button class="modal-btn-danger" id="modal-confirm">Delete</button>
    </div>
  </div>
</div>
</body>
</html>
